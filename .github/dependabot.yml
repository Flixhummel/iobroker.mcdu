# Dependabot will run on day 11 of each month at 03:26 (Europe/Berlin timezone)
version: 2
updates:

  - package-ecosystem: 'npm'
    directories:
      - '/**'
    schedule:
      interval: 'cron'
      timezone: 'Europe/Berlin'
      cronjob: '26 3 11 * *'
    open-pull-requests-limit: 15
    assignees:
      - 'Flixhummel'
    versioning-strategy: 'increase'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'cron'
      timezone: 'Europe/Berlin'
      cronjob: '26 3 11 * *'
    open-pull-requests-limit: 15
    assignees:
      - 'Flixhummel'
